services:
  ksrpc:
    image: ${OCI_IMAGE_REF}
    container_name: ${KSRPC_CONTAINER_NAME}
    restart: always # managed as deployment template default  
    command: ["python", "-u", "-m", "gunicorn", "-c", "/etc/ksrpc/gunicorn.conf.py", "ksrpc.run_gunicorn:web_app"]
    env_file:
      - .env
    environment:
      CONFIG: /etc/ksrpc/ksrpc.conf.py
    volumes:
      - "${KSRPC_GUNICORN_CONFIG_PATH:-./gunicorn.conf.py}:/etc/ksrpc/gunicorn.conf.py:ro"
      - "${KSRPC_CONFIG_PATH:-./ksrpc.conf.py}:/etc/ksrpc/ksrpc.conf.py:ro"
      - "${KSRPC_CACHE_HOST_PATH:-./data/cache}:${KSRPC_CACHE_PATH:-/opt/ksrpc/cache}"
    ports:
      - "${KSRPC_HOST_PORT}:${KSRPC_PORT}"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os,socket; p=int(os.getenv('KSRPC_PORT','8080')); s=socket.create_connection(('127.0.0.1', p), 3); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
