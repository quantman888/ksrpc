services:
  ksrpc:
    image: ${OCI_IMAGE_REF:?OCI_IMAGE_REF must be a digest reference like registry/namespace/ksrpc@sha256:...}
    container_name: ${KSRPC_CONTAINER_NAME:-ksrpc}
    restart: unless-stopped
    command: ["python", "-u", "-m", "ksrpc.run_app"]
    environment:
      CONFIG: ${KSRPC_CONFIG_PATH:-}
    ports:
      - "${KSRPC_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import socket; s=socket.create_connection(('127.0.0.1', 8080), 3); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
