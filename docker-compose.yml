services:
  ksrpc:
    image: ${OCI_IMAGE_REF}
    container_name: ${KSRPC_CONTAINER_NAME}
    restart: always # managed as deployment template default
    command: ["python", "-u", "-m", "gunicorn", "ksrpc.run_gunicorn:web_app", "--bind", "0.0.0.0:8080", "--worker-class", "aiohttp.GunicornWebWorker", "--workers", "1", "--timeout", "300", "--graceful-timeout", "30", "--keep-alive", "5", "--access-logfile", "-", "--error-logfile", "-", "--log-level", "info"]
    environment:
      CONFIG: ${KSRPC_CONFIG_PATH}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
      KSRPC_HOST: ${KSRPC_HOST}
      KSRPC_PORT: ${KSRPC_PORT}
      KSRPC_PATH_HTTP: ${KSRPC_PATH_HTTP}
      KSRPC_PATH_WS: ${KSRPC_PATH_WS}
      KSRPC_BASIC_USER: ${KSRPC_BASIC_USER}
      KSRPC_BASIC_PASSWORD: ${KSRPC_BASIC_PASSWORD}
      KSRPC_BASIC_CREDENTIALS_JSON: ${KSRPC_BASIC_CREDENTIALS_JSON}
      KSRPC_IMPORT_RULES_JSON: ${KSRPC_IMPORT_RULES_JSON}
      KSRPC_CACHE_ENABLE: ${KSRPC_CACHE_ENABLE}
      KSRPC_CACHE_PATH: /opt/ksrpc/cache
      KSRPC_CACHE_TIMEOUT_JSON: ${KSRPC_CACHE_TIMEOUT_JSON}
    volumes:
      - "./deploy/custom_config.py:/etc/ksrpc/custom_config.py:ro"
      - "./data/cache:/opt/ksrpc/cache"
    ports:
      - "${KSRPC_HOST_PORT}:${KSRPC_PORT}"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os,socket; p=int(os.getenv('KSRPC_PORT','8080')); s=socket.create_connection(('127.0.0.1', p), 3); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
