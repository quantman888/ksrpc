services:
  ksrpc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${KSRPC_CONTAINER_NAME:-ksrpc}
    restart: always
    command: ["python", "-u", "-m", "gunicorn", "-c", "/etc/ksrpc/gunicorn.conf.py", "ksrpc.run_gunicorn:web_app"]
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      CONFIG_SERVER: /etc/ksrpc/ksrpc.conf.py
      KSRPC_GUNICORN_BIND: 0.0.0.0:8080
      PORT: "8080"
      CACHE_PATH: /opt/ksrpc/cache
    volumes:
      - "./gunicorn.conf.py:/etc/ksrpc/gunicorn.conf.py:ro"
      - "./ksrpc.conf.py:/etc/ksrpc/ksrpc.conf.py:ro"
      - "./data/cache:/opt/ksrpc/cache"
    ports:
      - "${KSRPC_HOST_PORT:-19801}:8080"
