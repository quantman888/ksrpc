services:
  ksrpc:
    image: ${OCI_IMAGE_REF}
    container_name: ${KSRPC_CONTAINER_NAME}
    restart: always # managed as deployment template default
    command: ["python", "-u", "-m", "gunicorn", "-c", "/etc/ksrpc/gunicorn.conf.py", "ksrpc.run_gunicorn:web_app"]
    env_file:
      - .env
    environment:
      CONFIG: ${CONFIG:-/app/deploy/custom_config.py}
      KSRPC_CACHE_PATH: /opt/ksrpc/cache
    volumes:
      - "${KSRPC_GUNICORN_CONFIG_HOST_DIR:-.}:/etc/ksrpc:ro"
      - "${KSRPC_CACHE_HOST_PATH:-./data/cache}:/opt/ksrpc/cache"
    ports:
      - "${KSRPC_HOST_PORT}:${KSRPC_PORT}"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os,socket; p=int(os.getenv('KSRPC_PORT','8080')); s=socket.create_connection(('127.0.0.1', p), 3); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
