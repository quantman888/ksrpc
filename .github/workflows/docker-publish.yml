name: Artifact Publish

on:
  workflow_dispatch:
    inputs:
      publish_oci_image:
        description: "Build and publish OCI image"
        required: false
        type: boolean
        default: true
      publish_python_package:
        description: "Build and publish Python package"
        required: false
        type: boolean
        default: false
      release_version:
        description: "Only required on docker-stable when publishing OCI image (example: 1.2.3 or 1.2.3-rc.1)"
        required: false
        type: string

concurrency:
  group: artifact-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  guard_branch:
    name: Artifact Publish / Guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch and publish options
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          PUBLISH_OCI_IMAGE: ${{ inputs.publish_oci_image }}
          PUBLISH_PYTHON_PACKAGE: ${{ inputs.publish_python_package }}
          ENABLE_PYTHON_PACKAGE_PUBLISH: ${{ vars.ENABLE_PYTHON_PACKAGE_PUBLISH || '' }}
          NEXUS_REGISTRY: ${{ vars.NEXUS_REGISTRY || '' }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME || '' }}
          NEXUS_PYPI_REPOSITORY_URL: ${{ vars.NEXUS_PYPI_REPOSITORY_URL || '' }}
        run: |
          set -euo pipefail

          if [[ "${REF_TYPE}" != "branch" ]]; then
            echo "::error::workflow_dispatch can only run on branch refs. current ref_type=${REF_TYPE}"
            exit 1
          fi

          if [[ "${PUBLISH_OCI_IMAGE}" != "true" && "${PUBLISH_PYTHON_PACKAGE}" != "true" ]]; then
            echo "::error::at least one artifact must be selected: publish_oci_image or publish_python_package"
            exit 1
          fi

          case "${REF_NAME}" in
            docker|docker-limited)
              ;;
            docker-stable)
              if [[ "${PUBLISH_OCI_IMAGE}" == "true" && -z "${RELEASE_VERSION}" ]]; then
                echo "::error::docker-stable requires inputs.release_version when publish_oci_image=true"
                exit 1
              fi
              ;;
            *)
              echo "::error::allowed branches: docker / docker-stable / docker-limited; current=${REF_NAME}"
              exit 1
              ;;
          esac

          if [[ "${PUBLISH_OCI_IMAGE}" == "true" ]]; then
            if [[ -z "${NEXUS_REGISTRY}" ]]; then
              echo "::error::vars.NEXUS_REGISTRY is required when publish_oci_image=true"
              exit 1
            fi
            if [[ -z "${IMAGE_NAME}" ]]; then
              echo "::error::vars.IMAGE_NAME is required when publish_oci_image=true"
              exit 1
            fi
          fi

          if [[ "${PUBLISH_PYTHON_PACKAGE}" == "true" ]]; then
            if [[ "${ENABLE_PYTHON_PACKAGE_PUBLISH}" != "true" ]]; then
              echo "::error::Python package publishing is not enabled for this repository. Set vars.ENABLE_PYTHON_PACKAGE_PUBLISH=true first."
              exit 1
            fi
            if [[ -z "${NEXUS_PYPI_REPOSITORY_URL}" ]]; then
              echo "::error::vars.NEXUS_PYPI_REPOSITORY_URL is required when publish_python_package=true"
              exit 1
            fi
          fi

  docker_publish:
    name: Artifact Publish / OCI
    if: ${{ inputs.publish_oci_image }}
    needs: [guard_branch]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@990bbc77f57acc057bc620fa4d9e27461c808f69
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH || 'Dockerfile' }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT || '.' }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS || 'linux/amd64' }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS || '' }}
      OCI_PUSH_IMAGE: true
      OCI_PUBLISH_CHANNEL: ${{ github.ref_name == 'docker-stable' && 'release' || 'edge' }}
      OCI_RELEASE_VERSION: ${{ github.ref_name == 'docker-stable' && inputs.release_version || '' }}
      OCI_PUBLISH_LATEST: ${{ github.ref_name == 'docker-stable' }}
      OCI_GATE_VULN_IGNORE_UNFIXED: true
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  python_package_publish:
    name: Artifact Publish / Python Package
    if: ${{ inputs.publish_python_package && vars.ENABLE_PYTHON_PACKAGE_PUBLISH == 'true' }}
    needs: [guard_branch]
    uses: quantman888/workflow-reusable/.github/workflows/python-package-publish.reusable.yml@990bbc77f57acc057bc620fa4d9e27461c808f69
    with:
      PYTHON_PACKAGE_REPOSITORY_URL: ${{ vars.NEXUS_PYPI_REPOSITORY_URL }}
      PYTHON_PACKAGE_SIMPLE_URL: ${{ vars.NEXUS_PYPI_SIMPLE_URL || '' }}
      PYTHON_PACKAGE_TRUSTED_HOST: ${{ vars.NEXUS_PYPI_TRUSTED_HOST || '' }}
      PYTHON_PUSH_PACKAGE: true
      PYTHON_SKIP_EXISTING: true
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}
