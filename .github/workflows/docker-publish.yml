name: Docker / Publish

on:
  pull_request:
    branches: [docker]
  push:
    branches: [docker]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  test:
    name: Docker Publish / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: |
          set +e
          python -m pytest -q tests
          test_exit_code=$?
          set -e

          if [[ "${test_exit_code}" -eq 5 ]]; then
            echo "No tests collected under tests/, continue."
            exit 0
          fi

          exit "${test_exit_code}"

  publish_pr:
    name: Docker Publish / PR Dry Run
    if: ${{ github.event_name == 'pull_request' }}
    needs: [test]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@bbb2788457a0609a6126bc0b0103dc5e413666f3
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH || 'Dockerfile' }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT || '.' }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS || 'linux/amd64' }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS || '' }}
      OCI_PUSH_IMAGE: false
      OCI_PUBLISH_CHANNEL: none
      OCI_PUBLISH_LATEST: false

  publish_push_docker:
    name: Docker Publish / Docker Edge
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/docker' }}
    needs: [test]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@bbb2788457a0609a6126bc0b0103dc5e413666f3
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH || 'Dockerfile' }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT || '.' }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS || 'linux/amd64' }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS || '' }}
      OCI_PUSH_IMAGE: true
      OCI_PUBLISH_CHANNEL: edge
      OCI_PUBLISH_LATEST: false
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  publish_workflow_dispatch:
    name: Docker Publish / Manual Edge
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [test]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@bbb2788457a0609a6126bc0b0103dc5e413666f3
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH || 'Dockerfile' }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT || '.' }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS || 'linux/amd64' }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS || '' }}
      OCI_PUSH_IMAGE: true
      OCI_PUBLISH_CHANNEL: edge
      OCI_PUBLISH_LATEST: false
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  publish_summary:
    name: Docker Publish / Summary
    if: ${{ always() && !cancelled() }}
    needs: [publish_pr, publish_push_docker, publish_workflow_dispatch]
    runs-on: ubuntu-latest
    outputs:
      image_with_digest: ${{ needs.publish_pr.outputs.image_with_digest || needs.publish_push_docker.outputs.image_with_digest || needs.publish_workflow_dispatch.outputs.image_with_digest }}
      image_ref: ${{ needs.publish_pr.outputs.image_ref || needs.publish_push_docker.outputs.image_ref || needs.publish_workflow_dispatch.outputs.image_ref }}
      digest: ${{ needs.publish_pr.outputs.digest || needs.publish_push_docker.outputs.digest || needs.publish_workflow_dispatch.outputs.digest }}
    steps:
      - name: Resolve summary outputs
        id: summary
        run: |
          image_with_digest="${{ needs.publish_pr.outputs.image_with_digest || needs.publish_push_docker.outputs.image_with_digest || needs.publish_workflow_dispatch.outputs.image_with_digest }}"
          image_ref="${{ needs.publish_pr.outputs.image_ref || needs.publish_push_docker.outputs.image_ref || needs.publish_workflow_dispatch.outputs.image_ref }}"
          digest="${{ needs.publish_pr.outputs.digest || needs.publish_push_docker.outputs.digest || needs.publish_workflow_dispatch.outputs.digest }}"

          {
            echo "image_with_digest=${image_with_digest}"
            echo "image_ref=${image_ref}"
            echo "digest=${digest}"
          } >> "${GITHUB_OUTPUT}"
      - name: Show reusable workflow outputs
        run: |
          {
            echo "### Docker Publish Summary"
            echo ""
            echo "- image_with_digest: \`${{ steps.summary.outputs.image_with_digest }}\`"
            echo "- image_ref: \`${{ steps.summary.outputs.image_ref }}\`"
            echo "- digest: \`${{ steps.summary.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
