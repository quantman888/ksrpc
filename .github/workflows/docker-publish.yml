name: Docker Publish

on:
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  runner_probe:
    name: Docker Publish / Runner Probe
    uses: quantman888/workflow-reusable/.github/workflows/runner-fallback.reusable.yml@f90ae8f03b57c2e00c6d1318211896f51fe392e1
    with:
      RUNNER_SELF_HOSTED_LABELS: ${{ vars.RUNNER_SELF_HOSTED_LABELS || 'self-hosted,linux,x64' }}
      RUNNER_GITHUB_HOSTED_LABEL: ${{ vars.RUNNER_GITHUB_HOSTED_LABEL || 'ubuntu-latest' }}
      RUNNER_FALLBACK_POLICY: github-hosted
    secrets:
      runner_probe_token: ${{ secrets.RUNNER_PROBE_TOKEN }}

  guard_branch:
    name: Docker Publish / Branch Guard
    needs: [runner_probe]
    runs-on: ${{ fromJSON(needs.runner_probe.outputs.selected_runs_on_json) }}
    steps:
      - name: Require docker or docker-stable branch for manual publish
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/docker" && "${GITHUB_REF}" != "refs/heads/docker-stable" ]]; then
            echo "::error::Manual publish is allowed only on refs/heads/docker or refs/heads/docker-stable. Current ref: ${GITHUB_REF}"
            exit 1
          fi

  publish_edge:
    name: Docker Publish / Edge
    needs: [runner_probe, guard_branch]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ fromJSON(needs.runner_probe.outputs.selected_runs_on_json) }}
    timeout-minutes: 50
    outputs:
      image_ref: ${{ steps.publish.outputs.image_ref }}
      image_tags: ${{ steps.publish.outputs.image_tags }}
      digest: ${{ steps.publish.outputs.digest }}
      image_with_digest: ${{ steps.publish.outputs.image_with_digest }}
      wheel_file: ${{ steps.publish.outputs.wheel_file }}
      wheel_version: ${{ steps.publish.outputs.wheel_version }}
      wheel_install_cmd: ${{ steps.publish.outputs.wheel_install_cmd }}
      upstream_package_spec: ${{ steps.publish_mode.outputs.upstream_package_spec }}
      upstream_package_version: ${{ steps.publish_mode.outputs.upstream_package_version }}
      upstream_install_cmd: ${{ steps.publish_mode.outputs.upstream_install_cmd }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve publish mode by branch
        id: publish_mode
        shell: bash
        env:
          BASE_BUILD_ARGS: ${{ vars.BUILD_ARGS }}
        run: |
          set -euo pipefail

          ref="${GITHUB_REF}"
          pypi_upload_wheel="false"
          build_args="${BASE_BUILD_ARGS:-}"
          upstream_package_spec=""
          upstream_package_version=""
          upstream_install_cmd=""

          case "${ref}" in
            refs/heads/docker)
              pypi_upload_wheel="true"
              ;;
            refs/heads/docker-stable)
              upstream_package_version="$(python3 -c "import json,urllib.request; data=json.load(urllib.request.urlopen('https://pypi.org/pypi/ksrpc/json', timeout=15)); print((data.get('info') or {}).get('version',''))" 2>/dev/null || true)"
              if [[ -z "${upstream_package_version}" ]]; then
                echo "failed to resolve latest ksrpc version from PyPI" >&2
                exit 1
              fi
              upstream_package_spec="ksrpc==${upstream_package_version}"
              build_args="$(printf '%s\n' "${build_args}" | sed '/^[[:space:]]*$/d' | grep -Eiv '^[[:space:]]*KSRPC_PIP_PACKAGE=' || true)"
              if [[ -n "${build_args}" ]]; then
                build_args="${build_args}"$'\n'
              fi
              build_args="${build_args}KSRPC_PIP_PACKAGE=${upstream_package_spec}"
              upstream_install_cmd="pip install ${upstream_package_spec}"
              ;;
            *)
              echo "unsupported branch: ${ref}" >&2
              exit 1
              ;;
          esac

          {
            echo "pypi_upload_wheel=${pypi_upload_wheel}"
            echo "upstream_package_spec=${upstream_package_spec}"
            echo "upstream_package_version=${upstream_package_version}"
            echo "upstream_install_cmd=${upstream_install_cmd}"
            echo "oci_build_args<<EOF"
            if [[ -n "${build_args}" ]]; then
              printf '%s\n' "${build_args}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Publish image
        id: publish
        uses: ./.github/actions/docker-publish
        with:
          OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
          OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH }}
          OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
          OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS }}
          OCI_BUILD_ARGS: ${{ steps.publish_mode.outputs.oci_build_args }}
          OCI_PUSH_IMAGE: 'true'
          OCI_PUBLISH_CHANNEL: edge
          OCI_GATE_VULN_SEVERITY: CRITICAL
          OCI_GATE_VULN_IGNORE_UNFIXED: 'true'
          OCI_PUBLISH_LATEST: 'false'
          PYPI_UPLOAD_WHEEL: ${{ steps.publish_mode.outputs.pypi_upload_wheel }}
          PYPI_REPOSITORY_URL: ${{ vars.NEXUS_PYPI_REPOSITORY_URL }}
          PYPI_SIMPLE_URL: ${{ vars.NEXUS_PYPI_SIMPLE_URL }}
          PYPI_PACKAGE_NAME: ksrpc
          PYPI_TRUSTED_HOST: ${{ vars.NEXUS_PYPI_TRUSTED_HOST }}
          nexus_username: ${{ secrets.NEXUS_USERNAME }}
          nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  publish_summary:
    name: Docker Publish / Summary
    if: ${{ always() && !cancelled() }}
    needs: [runner_probe, publish_edge]
    runs-on: ${{ fromJSON(needs.runner_probe.outputs.selected_runs_on_json) }}
    timeout-minutes: 10
    outputs:
      OCI_IMAGE_WITH_DIGEST: ${{ needs.publish_edge.outputs.image_with_digest }}
      OCI_IMAGE_REF: ${{ needs.publish_edge.outputs.image_ref }}
      OCI_IMAGE_TAGS: ${{ needs.publish_edge.outputs.image_tags }}
      OCI_DIGEST: ${{ needs.publish_edge.outputs.digest }}
      PYPI_WHEEL_FILE: ${{ needs.publish_edge.outputs.wheel_file }}
      PYPI_WHEEL_VERSION: ${{ needs.publish_edge.outputs.wheel_version }}
      PYPI_INSTALL_CMD: ${{ needs.publish_edge.outputs.wheel_install_cmd }}
      KSRPC_UPSTREAM_PACKAGE_SPEC: ${{ needs.publish_edge.outputs.upstream_package_spec }}
      KSRPC_UPSTREAM_VERSION: ${{ needs.publish_edge.outputs.upstream_package_version }}
      KSRPC_UPSTREAM_INSTALL_CMD: ${{ needs.publish_edge.outputs.upstream_install_cmd }}
    steps:
      - name: Resolve summary outputs
        id: summary
        run: |
          OCI_IMAGE_WITH_DIGEST="${{ needs.publish_edge.outputs.image_with_digest }}"
          OCI_IMAGE_REF="${{ needs.publish_edge.outputs.image_ref }}"
          OCI_IMAGE_TAGS="${{ needs.publish_edge.outputs.image_tags }}"
          OCI_DIGEST="${{ needs.publish_edge.outputs.digest }}"
          PYPI_WHEEL_FILE="${{ needs.publish_edge.outputs.wheel_file }}"
          PYPI_WHEEL_VERSION="${{ needs.publish_edge.outputs.wheel_version }}"
          PYPI_INSTALL_CMD="${{ needs.publish_edge.outputs.wheel_install_cmd }}"
          KSRPC_UPSTREAM_PACKAGE_SPEC="${{ needs.publish_edge.outputs.upstream_package_spec }}"
          KSRPC_UPSTREAM_VERSION="${{ needs.publish_edge.outputs.upstream_package_version }}"
          KSRPC_UPSTREAM_INSTALL_CMD="${{ needs.publish_edge.outputs.upstream_install_cmd }}"

          {
            echo "OCI_IMAGE_WITH_DIGEST=${OCI_IMAGE_WITH_DIGEST}"
            echo "OCI_IMAGE_REF=${OCI_IMAGE_REF}"
            echo "OCI_IMAGE_TAGS=${OCI_IMAGE_TAGS}"
            echo "OCI_DIGEST=${OCI_DIGEST}"
            echo "PYPI_WHEEL_FILE=${PYPI_WHEEL_FILE}"
            echo "PYPI_WHEEL_VERSION=${PYPI_WHEEL_VERSION}"
            echo "PYPI_INSTALL_CMD=${PYPI_INSTALL_CMD}"
            echo "KSRPC_UPSTREAM_PACKAGE_SPEC=${KSRPC_UPSTREAM_PACKAGE_SPEC}"
            echo "KSRPC_UPSTREAM_VERSION=${KSRPC_UPSTREAM_VERSION}"
            echo "KSRPC_UPSTREAM_INSTALL_CMD=${KSRPC_UPSTREAM_INSTALL_CMD}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show reusable workflow outputs
        run: |
          PYPI_INSTALL_CMD="${{ steps.summary.outputs.PYPI_INSTALL_CMD }}"
          KSRPC_UPSTREAM_VERSION="${{ steps.summary.outputs.KSRPC_UPSTREAM_VERSION }}"
          KSRPC_UPSTREAM_PACKAGE_SPEC="${{ steps.summary.outputs.KSRPC_UPSTREAM_PACKAGE_SPEC }}"
          KSRPC_UPSTREAM_INSTALL_CMD="${{ steps.summary.outputs.KSRPC_UPSTREAM_INSTALL_CMD }}"
          {
            echo "### Docker Publish Summary"
            echo ""
            echo "- OCI_IMAGE_WITH_DIGEST: \`${{ steps.summary.outputs.OCI_IMAGE_WITH_DIGEST }}\`"
            echo "- OCI_IMAGE_REF: \`${{ steps.summary.outputs.OCI_IMAGE_REF }}\`"
            echo "- OCI_IMAGE_TAGS: \`${{ steps.summary.outputs.OCI_IMAGE_TAGS }}\`"
            echo "- OCI_DIGEST: \`${{ steps.summary.outputs.OCI_DIGEST }}\`"
            echo "- PYPI_WHEEL_FILE: \`${{ steps.summary.outputs.PYPI_WHEEL_FILE }}\`"
            echo "- PYPI_WHEEL_VERSION: \`${{ steps.summary.outputs.PYPI_WHEEL_VERSION }}\`"
            if [[ -n "${PYPI_INSTALL_CMD}" ]]; then
              echo "- PYPI_INSTALL_CMD: \`${PYPI_INSTALL_CMD}\`"
            fi
            if [[ -n "${KSRPC_UPSTREAM_VERSION}" ]]; then
              echo "- KSRPC_UPSTREAM_VERSION: \`${KSRPC_UPSTREAM_VERSION}\`"
            fi
            if [[ -n "${KSRPC_UPSTREAM_PACKAGE_SPEC}" ]]; then
              echo "- KSRPC_UPSTREAM_PACKAGE_SPEC: \`${KSRPC_UPSTREAM_PACKAGE_SPEC}\`"
            fi
            if [[ -n "${KSRPC_UPSTREAM_INSTALL_CMD}" ]]; then
              echo "- KSRPC_UPSTREAM_INSTALL_CMD: \`${KSRPC_UPSTREAM_INSTALL_CMD}\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
