name: Docker Publish

on:
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish_pr:
    name: Docker Publish / PR Dry Run
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/docker-publish.reusable.yml
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS }}
      OCI_PUSH_IMAGE: false
      OCI_PUBLISH_CHANNEL: none
      OCI_PUBLISH_LATEST: false

  publish_edge:
    name: Docker Publish / Edge
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/docker') || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/docker-publish.reusable.yml
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS }}
      OCI_PUSH_IMAGE: true
      OCI_PUBLISH_CHANNEL: edge
      OCI_GATE_VULN_SEVERITY: CRITICAL
      OCI_GATE_VULN_IGNORE_UNFIXED: true
      OCI_PUBLISH_LATEST: false
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  publish_summary:
    name: Docker Publish / Summary
    if: ${{ always() && !cancelled() }}
    needs: [publish_pr, publish_edge]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      OCI_IMAGE_WITH_DIGEST: ${{ needs.publish_pr.outputs.image_with_digest || needs.publish_edge.outputs.image_with_digest }}
      OCI_IMAGE_REF: ${{ needs.publish_pr.outputs.image_ref || needs.publish_edge.outputs.image_ref }}
      OCI_IMAGE_TAGS: ${{ needs.publish_pr.outputs.image_tags || needs.publish_edge.outputs.image_tags }}
      OCI_DIGEST: ${{ needs.publish_pr.outputs.digest || needs.publish_edge.outputs.digest }}
    steps:
      - name: Resolve summary outputs
        id: summary
        run: |
          OCI_IMAGE_WITH_DIGEST="${{ needs.publish_pr.outputs.image_with_digest || needs.publish_edge.outputs.image_with_digest }}"
          OCI_IMAGE_REF="${{ needs.publish_pr.outputs.image_ref || needs.publish_edge.outputs.image_ref }}"
          OCI_IMAGE_TAGS="${{ needs.publish_pr.outputs.image_tags || needs.publish_edge.outputs.image_tags }}"
          OCI_DIGEST="${{ needs.publish_pr.outputs.digest || needs.publish_edge.outputs.digest }}"

          {
            echo "OCI_IMAGE_WITH_DIGEST=${OCI_IMAGE_WITH_DIGEST}"
            echo "OCI_IMAGE_REF=${OCI_IMAGE_REF}"
            echo "OCI_IMAGE_TAGS=${OCI_IMAGE_TAGS}"
            echo "OCI_DIGEST=${OCI_DIGEST}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show reusable workflow outputs
        run: |
          {
            echo "### Docker Publish Summary"
            echo ""
            echo "- OCI_IMAGE_WITH_DIGEST: \`${{ steps.summary.outputs.OCI_IMAGE_WITH_DIGEST }}\`"
            echo "- OCI_IMAGE_REF: \`${{ steps.summary.outputs.OCI_IMAGE_REF }}\`"
            echo "- OCI_IMAGE_TAGS: \`${{ steps.summary.outputs.OCI_IMAGE_TAGS }}\`"
            echo "- OCI_DIGEST: \`${{ steps.summary.outputs.OCI_DIGEST }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
