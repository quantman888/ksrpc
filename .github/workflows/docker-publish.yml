name: Docker Publish

on:
  pull_request:
    branches: [docker]
  push:
    branches: [docker]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Docker Publish / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests
          rc=$?
          set -e

          if [ "${rc}" -eq 0 ]; then
            echo "pytest passed."
          elif [ "${rc}" -eq 5 ]; then
            echo "pytest exit code 5 (no tests collected), treated as success."
          else
            echo "pytest failed with exit code ${rc}."
            exit "${rc}"
          fi

  publish_pr:
    name: Docker Publish / PR Dry Run
    if: ${{ github.event_name == 'pull_request' }}
    needs: [test]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@d42ed64b33a1f5675adf88f61ddc3255be00d5d2
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS }}
      OCI_PUSH_IMAGE: false
      OCI_PUBLISH_CHANNEL: none
      OCI_PUBLISH_LATEST: false

  publish_push_docker:
    name: Docker Publish / Docker Edge
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/docker' }}
    needs: [test]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@d42ed64b33a1f5675adf88f61ddc3255be00d5d2
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS }}
      OCI_PUSH_IMAGE: true
      OCI_PUBLISH_CHANNEL: edge
      OCI_PUBLISH_LATEST: false
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  publish_workflow_dispatch:
    name: Docker Publish / Manual Edge
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [test]
    uses: quantman888/workflow-reusable/.github/workflows/docker-publish.reusable.yml@d42ed64b33a1f5675adf88f61ddc3255be00d5d2
    with:
      OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
      OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      OCI_DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH }}
      OCI_BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT }}
      OCI_TARGET_PLATFORMS: ${{ vars.TARGET_PLATFORMS }}
      OCI_BUILD_ARGS: ${{ vars.BUILD_ARGS }}
      OCI_PUSH_IMAGE: true
      OCI_PUBLISH_CHANNEL: edge
      OCI_PUBLISH_LATEST: false
    secrets:
      nexus_username: ${{ secrets.NEXUS_USERNAME }}
      nexus_password: ${{ secrets.NEXUS_PASSWORD }}

  publish_summary:
    name: Docker Publish / Summary
    if: ${{ always() && !cancelled() }}
    needs: [publish_pr, publish_push_docker, publish_workflow_dispatch]
    runs-on: ubuntu-latest
    outputs:
      OCI_IMAGE_WITH_DIGEST: ${{ needs.publish_pr.outputs.image_with_digest || needs.publish_push_docker.outputs.image_with_digest || needs.publish_workflow_dispatch.outputs.image_with_digest }}
      OCI_IMAGE_REF: ${{ needs.publish_pr.outputs.image_ref || needs.publish_push_docker.outputs.image_ref || needs.publish_workflow_dispatch.outputs.image_ref }}
      OCI_IMAGE_TAGS: ${{ needs.publish_pr.outputs.image_tags || needs.publish_push_docker.outputs.image_tags || needs.publish_workflow_dispatch.outputs.image_tags }}
      OCI_DIGEST: ${{ needs.publish_pr.outputs.digest || needs.publish_push_docker.outputs.digest || needs.publish_workflow_dispatch.outputs.digest }}
    steps:
      - name: Resolve summary outputs
        id: summary
        run: |
          OCI_IMAGE_WITH_DIGEST="${{ needs.publish_pr.outputs.image_with_digest || needs.publish_push_docker.outputs.image_with_digest || needs.publish_workflow_dispatch.outputs.image_with_digest }}"
          OCI_IMAGE_REF="${{ needs.publish_pr.outputs.image_ref || needs.publish_push_docker.outputs.image_ref || needs.publish_workflow_dispatch.outputs.image_ref }}"
          OCI_IMAGE_TAGS="${{ needs.publish_pr.outputs.image_tags || needs.publish_push_docker.outputs.image_tags || needs.publish_workflow_dispatch.outputs.image_tags }}"
          OCI_DIGEST="${{ needs.publish_pr.outputs.digest || needs.publish_push_docker.outputs.digest || needs.publish_workflow_dispatch.outputs.digest }}"

          {
            echo "OCI_IMAGE_WITH_DIGEST=${OCI_IMAGE_WITH_DIGEST}"
            echo "OCI_IMAGE_REF=${OCI_IMAGE_REF}"
            echo "OCI_IMAGE_TAGS=${OCI_IMAGE_TAGS}"
            echo "OCI_DIGEST=${OCI_DIGEST}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show reusable workflow outputs
        run: |
          {
            echo "### Docker Publish Summary"
            echo ""
            echo "- OCI_IMAGE_WITH_DIGEST: \`${{ steps.summary.outputs.OCI_IMAGE_WITH_DIGEST }}\`"
            echo "- OCI_IMAGE_REF: \`${{ steps.summary.outputs.OCI_IMAGE_REF }}\`"
            echo "- OCI_IMAGE_TAGS: \`${{ steps.summary.outputs.OCI_IMAGE_TAGS }}\`"
            echo "- OCI_DIGEST: \`${{ steps.summary.outputs.OCI_DIGEST }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
