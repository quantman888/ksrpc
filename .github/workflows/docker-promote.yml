name: Docker / Promote

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      OCI_RELEASE_VERSION:
        description: "Release version (supports v1.2.3, 1.2.3, 1.2.3-rc.N)"
        required: false
        type: string
        default: ""
      OCI_IMAGE_WITH_DIGEST:
        description: "Source image with digest (image@sha256:...)"
        required: false
        type: string
        default: ""
      OCI_PUBLISH_LATEST:
        description: "Also promote latest tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  test:
    name: Docker Promote / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: |
          set +e
          python -m pytest -q tests
          test_exit_code=$?
          set -e

          if [[ "${test_exit_code}" -eq 5 ]]; then
            echo "No tests collected under tests/, continue."
            exit 0
          fi

          exit "${test_exit_code}"

  promote:
    name: Docker Promote / Promote Tags
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        shell: bash
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Nexus registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Resolve promotion targets
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          INPUT_OCI_RELEASE_VERSION: ${{ github.event.inputs.OCI_RELEASE_VERSION }}
          INPUT_OCI_IMAGE_WITH_DIGEST: ${{ github.event.inputs.OCI_IMAGE_WITH_DIGEST }}
          INPUT_OCI_PUBLISH_LATEST: ${{ github.event.inputs.OCI_PUBLISH_LATEST }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "release" ]]; then
            raw_version="${RELEASE_TAG:-}"
            publish_latest="true"
            oci_image_with_digest="$(printf '%s\n' "${RELEASE_BODY:-}" | sed -nE 's/^[[:space:]]*OCI_IMAGE_WITH_DIGEST[[:space:]]*[:=][[:space:]]*([^[:space:]]+)[[:space:]]*$/\1/p' | head -n1 || true)"
            if [[ -z "${oci_image_with_digest}" ]]; then
              oci_image_with_digest="$(printf '%s\n' "${RELEASE_BODY:-}" | grep -Eo "[^[:space:]]+@sha256:[0-9A-Fa-f]{64}" | head -n1 || true)"
            fi
          else
            raw_version="${INPUT_OCI_RELEASE_VERSION:-}"
            publish_latest="${INPUT_OCI_PUBLISH_LATEST:-false}"
            oci_image_with_digest="${INPUT_OCI_IMAGE_WITH_DIGEST:-}"
          fi

          if [[ -z "${raw_version}" ]]; then
            echo "OCI_RELEASE_VERSION is required."
            exit 1
          fi

          version="${raw_version#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "invalid OCI_RELEASE_VERSION: ${raw_version}"
            exit 1
          fi

          if [[ -z "${oci_image_with_digest}" ]]; then
            echo "OCI_IMAGE_WITH_DIGEST is required."
            exit 1
          fi
          if [[ ! "${oci_image_with_digest}" =~ ^[^[:space:]]+@sha256:[0-9A-Fa-f]{64}$ ]]; then
            echo "invalid OCI_IMAGE_WITH_DIGEST: ${oci_image_with_digest}"
            exit 1
          fi

          image_ref="${oci_image_with_digest%@*}"
          digest="${oci_image_with_digest##*@}"

          image_ref_without_registry="${image_ref#*/}"
          last_segment="${image_ref_without_registry##*/}"
          if [[ "${last_segment}" == *:* ]]; then
            echo "OCI_IMAGE_WITH_DIGEST must be digest-only (tagged refs are forbidden): ${oci_image_with_digest}"
            exit 1
          fi

          tags=("${version}")
          stable_release="false"
          if [[ "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            stable_release="true"
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            tags+=("${major}.${minor}" "${major}")
          fi

          if [[ "${publish_latest}" == "true" && "${stable_release}" == "true" ]]; then
            tags+=("latest")
          fi

          {
            echo "image_ref=${image_ref}"
            echo "digest=${digest}"
            echo "oci_image_with_digest=${oci_image_with_digest}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Promote tags from digest
        env:
          IMAGE_REF: ${{ steps.resolve.outputs.image_ref }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
          TAGS: ${{ steps.resolve.outputs.tags }}
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            if [[ -z "${tag}" ]]; then
              continue
            fi
            target_ref="${IMAGE_REF}:${tag}"
            docker buildx imagetools create --tag "${target_ref}" "${IMAGE_REF}@${DIGEST}"
          done <<< "${TAGS}"

      - name: Attest promoted image provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ steps.resolve.outputs.image_ref }}
          subject-digest: ${{ steps.resolve.outputs.digest }}
          push-to-registry: true

      - name: Promotion summary
        run: |
          {
            echo "### Docker Promote Summary"
            echo ""
            echo "- source: \`${{ steps.resolve.outputs.oci_image_with_digest }}\`"
            echo "- promoted tags:"
            while IFS= read -r tag; do
              if [[ -n "${tag}" ]]; then
                echo "  - \`${{ steps.resolve.outputs.image_ref }}:${tag}\`"
              fi
            done <<< "${{ steps.resolve.outputs.tags }}"
          } >> "${GITHUB_STEP_SUMMARY}"
