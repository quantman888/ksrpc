name: CI Check

on:
  pull_request:
    branches: [docker]
  push:
    branches: [docker]
  workflow_dispatch:

concurrency:
  group: ci-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: CI Check / Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m pytest -q tests
          rc=$?
          set -e

          if [ "${rc}" -eq 0 ]; then
            echo "pytest passed."
          elif [ "${rc}" -eq 5 ]; then
            echo "pytest exit code 5 (no tests collected), treated as success."
          else
            echo "pytest failed with exit code ${rc}."
            exit "${rc}"
          fi
