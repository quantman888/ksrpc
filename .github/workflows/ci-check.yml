name: CI Check

on:
  pull_request:
    branches: [docker]
  push:
    branches: [docker]
  workflow_dispatch:

concurrency:
  group: ci-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  runner_probe:
    name: CI Check / Runner Probe
    uses: quantman888/workflow-reusable/.github/workflows/runner-fallback.reusable.yml@e1125b9813c58f9f770b00e695bf400e62902825
    with:
      RUNNER_SELF_HOSTED_LABELS: ${{ vars.RUNNER_SELF_HOSTED_LABELS || 'self-hosted,linux,x64' }}
      RUNNER_GITHUB_HOSTED_LABEL: ${{ vars.RUNNER_GITHUB_HOSTED_LABEL || 'ubuntu-latest' }}
      RUNNER_FALLBACK_POLICY: github-hosted
    secrets:
      runner_probe_token: ${{ secrets.RUNNER_PROBE_TOKEN }}

  test:
    name: CI Check / Test
    needs: [runner_probe]
    runs-on: ${{ fromJSON(needs.runner_probe.outputs.selected_runs_on_json) }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run config template drift check
        shell: bash
        run: python -X utf8 .github/scripts/check_config_drift.py
