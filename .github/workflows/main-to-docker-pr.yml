name: Branch Sync / Main to Docker PR

on:
  workflow_run:
    workflows:
      - Sync Upstream / Main
    types:
      - completed
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: main-to-docker-pr
  cancel-in-progress: true

jobs:
  open_pr:
    name: Branch Sync / Open PR
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/branch-sync-pr.reusable.yml
    secrets:
      RUNNER_PROBE_TOKEN: ${{ secrets.RUNNER_PROBE_TOKEN }}
      BRANCH_SYNC_PR_TOKEN: ${{ secrets.BRANCH_SYNC_PR_TOKEN }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
    with:
      source_branch: main
      target_branch: docker
      pr_title: "chore(sync): merge main into docker"
      pr_body: |
        Auto-generated PR from branch sync workflow.
        - source: main
        - target: docker
        - purpose: keep docker branch up to date with latest upstream-synced main
      auto_resolve_theirs_paths: |
        README.md
        examples/tushare
