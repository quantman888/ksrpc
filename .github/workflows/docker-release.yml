name: Docker Release

on:
  workflow_dispatch:
    inputs:
      OCI_RELEASE_VERSION:
        description: "Release version (supports v1.2.3, 1.2.3, 1.2.3-rc.N; leave blank to auto-read ksrpc/_version.py or latest ksrpc on PyPI)"
        required: false
        type: string
      OCI_SOURCE_TAG:
        description: "Source tag to promote from (leave blank to use current commit sha-<12>)"
        required: false
        type: string
        default: ""
      OCI_PUBLISH_LATEST:
        description: "Also promote latest tag"
        required: false
        type: boolean
        default: true
      OCI_PUBLISH_RELEASE_ASSETS:
        description: "Publish GitHub release assets"
        required: false
        type: boolean
        default: false
      OCI_RELEASE_ASSETS_GLOB:
        description: "Comma-separated glob patterns for release assets (required when OCI_PUBLISH_RELEASE_ASSETS=true)"
        required: false
        type: string
        default: ""

concurrency:
  group: docker-promote-${{ vars.NEXUS_REGISTRY }}-${{ vars.IMAGE_NAME }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  runner_probe:
    name: Docker Release / Runner Probe
    uses: quantman888/workflow-reusable/.github/workflows/runner-fallback.reusable.yml@f90ae8f03b57c2e00c6d1318211896f51fe392e1
    with:
      RUNNER_SELF_HOSTED_LABELS: ${{ vars.RUNNER_SELF_HOSTED_LABELS || 'self-hosted,linux,x64' }}
      RUNNER_GITHUB_HOSTED_LABEL: ${{ vars.RUNNER_GITHUB_HOSTED_LABEL || 'ubuntu-latest' }}
      RUNNER_FALLBACK_POLICY: github-hosted
    secrets:
      runner_probe_token: ${{ secrets.RUNNER_PROBE_TOKEN }}

  test:
    name: Docker Release / Test
    needs: [runner_probe]
    runs-on: ${{ fromJSON(needs.runner_probe.outputs.selected_runs_on_json) }}
    timeout-minutes: 15
    steps:
      - name: Require docker-stable branch for manual release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/docker-stable" ]]; then
            echo "::error::Manual release is allowed only on refs/heads/docker-stable. Current ref: ${GITHUB_REF}"
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate deployment files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "Dockerfile"
            ".env.example"
            "gunicorn.conf.py"
            "ksrpc.conf.py"
          )
          for f in "${required_files[@]}"; do
            if [[ ! -f "${f}" ]]; then
              echo "::error::missing required deployment file: ${f}"
              exit 1
            fi
          done
          if [[ ! -f "docker-compose.yml" && ! -f "docker-compose.yaml" ]]; then
            echo "::error::missing required deployment file: docker-compose.yml or docker-compose.yaml"
            exit 1
          fi

  promote:
    name: Docker Release / Promote Tags
    runs-on: ${{ fromJSON(needs.runner_probe.outputs.selected_runs_on_json) }}
    needs: [runner_probe, test]
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to Nexus registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Resolve promotion targets
        id: resolve
        env:
          INPUT_OCI_RELEASE_VERSION: ${{ github.event.inputs.OCI_RELEASE_VERSION }}
          INPUT_OCI_SOURCE_TAG: ${{ github.event.inputs.OCI_SOURCE_TAG }}
          INPUT_OCI_PUBLISH_LATEST: ${{ github.event.inputs.OCI_PUBLISH_LATEST }}
          INPUT_OCI_PUBLISH_RELEASE_ASSETS: ${{ github.event.inputs.OCI_PUBLISH_RELEASE_ASSETS }}
          INPUT_OCI_RELEASE_ASSETS_GLOB: ${{ github.event.inputs.OCI_RELEASE_ASSETS_GLOB }}
          GITHUB_SHA: ${{ github.sha }}
          OCI_REGISTRY: ${{ vars.NEXUS_REGISTRY }}
          OCI_IMAGE_NAME: ${{ vars.IMAGE_NAME }}
        run: |
          set -euo pipefail

          raw_version="${INPUT_OCI_RELEASE_VERSION:-}"
          publish_latest="${INPUT_OCI_PUBLISH_LATEST:-true}"
          publish_release_assets="${INPUT_OCI_PUBLISH_RELEASE_ASSETS:-false}"
          release_assets_glob="${INPUT_OCI_RELEASE_ASSETS_GLOB:-}"
          input_source_tag="${INPUT_OCI_SOURCE_TAG:-}"
          if [[ -n "${input_source_tag//[[:space:]]/}" ]]; then
            source_tag="${input_source_tag}"
          else
            source_tag="sha-${GITHUB_SHA:0:12}"
          fi

          case "${publish_release_assets}" in
            true|false)
              ;;
            *)
              echo "invalid OCI_PUBLISH_RELEASE_ASSETS: ${publish_release_assets} (allowed: true|false)"
              exit 1
              ;;
          esac

          if [[ -z "${raw_version}" ]]; then
            if [[ -f "ksrpc/_version.py" ]]; then
              raw_version="$(sed -nE "s/^__version__[[:space:]]*=[[:space:]]*['\"]([^'\"]+)['\"].*$/\1/p" "ksrpc/_version.py" | head -n1 || true)"
            fi
            if [[ -z "${raw_version}" ]]; then
              raw_version="$(python3 -c "import json,urllib.request; data=json.load(urllib.request.urlopen('https://pypi.org/pypi/ksrpc/json', timeout=15)); print((data.get('info') or {}).get('version',''))" 2>/dev/null || true)"
            fi
            if [[ -z "${raw_version}" ]]; then
              echo "OCI_RELEASE_VERSION is empty and failed to resolve ksrpc version from repository or PyPI."
              exit 1
            fi
          fi

          version="${raw_version#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            echo "invalid OCI_RELEASE_VERSION: ${raw_version}"
            exit 1
          fi

          if [[ -z "${OCI_REGISTRY:-}" || -z "${OCI_IMAGE_NAME:-}" ]]; then
            echo "vars.NEXUS_REGISTRY and vars.IMAGE_NAME are required."
            exit 1
          fi
          if [[ -z "${source_tag}" ]]; then
            echo "OCI_SOURCE_TAG is required."
            exit 1
          fi
          if [[ "${publish_release_assets}" == "true" && -z "${release_assets_glob//[[:space:]]/}" ]]; then
            echo "OCI_RELEASE_ASSETS_GLOB is required when OCI_PUBLISH_RELEASE_ASSETS=true."
            exit 1
          fi

          image_ref="${OCI_REGISTRY%/}/${OCI_IMAGE_NAME}"
          source_ref="${image_ref}:${source_tag}"
          inspect_output="$(docker buildx imagetools inspect "${source_ref}" 2>&1 || true)"
          digest="$(printf '%s\n' "${inspect_output}" | sed -nE 's/^[[:space:]]*Digest:[[:space:]]*(sha256:[0-9A-Fa-f]{64}).*$/\1/p' | head -n1 || true)"
          if [[ -z "${digest}" ]]; then
            echo "unable to resolve digest from source tag: ${source_ref}"
            printf '%s\n' "${inspect_output}"
            exit 1
          fi
          oci_image_with_digest="${image_ref}@${digest}"

          tags=("${version}")
          stable_release="false"
          if [[ "${version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            stable_release="true"
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            tags+=("${major}.${minor}" "${major}")
          fi

          if [[ "${publish_latest}" == "true" && "${stable_release}" == "true" ]]; then
            tags+=("latest")
          fi

          {
            echo "OCI_IMAGE_REF=${image_ref}"
            echo "OCI_DIGEST=${digest}"
            echo "OCI_IMAGE_WITH_DIGEST=${oci_image_with_digest}"
            echo "OCI_SOURCE_TAG=${source_tag}"
            echo "OCI_SOURCE_REF=${source_ref}"
            echo "OCI_VERSION=${version}"
            echo "OCI_PUBLISH_RELEASE_ASSETS=${publish_release_assets}"
            echo "OCI_RELEASE_ASSETS_GLOB=${release_assets_glob}"
            echo "OCI_TAGS<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Promote tags from digest
        env:
          OCI_IMAGE_REF: ${{ steps.resolve.outputs.OCI_IMAGE_REF }}
          OCI_DIGEST: ${{ steps.resolve.outputs.OCI_DIGEST }}
          OCI_TAGS: ${{ steps.resolve.outputs.OCI_TAGS }}
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            if [[ -z "${tag}" ]]; then
              continue
            fi
            target_ref="${OCI_IMAGE_REF}:${tag}"
            docker buildx imagetools create --tag "${target_ref}" "${OCI_IMAGE_REF}@${OCI_DIGEST}"
          done <<< "${OCI_TAGS}"

      - name: Checkout repository for release assets
        if: ${{ steps.resolve.outputs.OCI_PUBLISH_RELEASE_ASSETS == 'true' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve release asset files
        id: release_assets
        if: ${{ steps.resolve.outputs.OCI_PUBLISH_RELEASE_ASSETS == 'true' }}
        env:
          OCI_RELEASE_ASSETS_GLOB: ${{ steps.resolve.outputs.OCI_RELEASE_ASSETS_GLOB }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          raw_globs="${OCI_RELEASE_ASSETS_GLOB:-}"
          normalized_globs="$(printf '%s' "${raw_globs}" | tr '\n' ',')"
          IFS=',' read -r -a patterns <<< "${normalized_globs}"

          declare -a files=()
          declare -A seen=()
          for pattern in "${patterns[@]}"; do
            pattern="$(printf '%s' "${pattern}" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
            if [[ -z "${pattern}" ]]; then
              continue
            fi

            while IFS= read -r file; do
              if [[ -z "${file}" ]]; then
                continue
              fi
              if [[ -z "${seen["${file}"]+x}" ]]; then
                files+=("${file}")
                seen["${file}"]=1
              fi
            done < <(compgen -G "${pattern}" || true)
          done

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No files matched OCI_RELEASE_ASSETS_GLOB: ${raw_globs}"
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release assets
        if: ${{ steps.resolve.outputs.OCI_PUBLISH_RELEASE_ASSETS == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          OCI_VERSION: ${{ steps.resolve.outputs.OCI_VERSION }}
          RELEASE_ASSET_FILES: ${{ steps.release_assets.outputs.files }}
        run: |
          set -euo pipefail
          release_tag="v${OCI_VERSION}"
          release_title="ksrpc ${OCI_VERSION}"

          mapfile -t files < <(printf '%s\n' "${RELEASE_ASSET_FILES}" | sed '/^[[:space:]]*$/d')
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets resolved."
            exit 1
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" "${files[@]}" --clobber
          else
            gh release create "${release_tag}" "${files[@]}" \
              --title "${release_title}" \
              --notes "Docker image release ${OCI_VERSION}."
          fi

      - name: Promotion summary
        if: ${{ always() }}
        env:
          OCI_PUBLISH_RELEASE_ASSETS: ${{ steps.resolve.outputs.OCI_PUBLISH_RELEASE_ASSETS }}
          OCI_VERSION: ${{ steps.resolve.outputs.OCI_VERSION }}
          OCI_RELEASE_ASSET_FILES: ${{ steps.release_assets.outputs.files }}
        run: |
          {
            echo "### Docker Promote Summary"
            echo ""
            echo "- source tag: \`${{ steps.resolve.outputs.OCI_SOURCE_REF }}\`"
            echo "- release version: \`${{ steps.resolve.outputs.OCI_VERSION }}\`"
            echo "- promoted tags:"
            while IFS= read -r tag; do
              if [[ -n "${tag}" ]]; then
                echo "  - \`${{ steps.resolve.outputs.OCI_IMAGE_REF }}:${tag}\`"
              fi
            done <<< "${{ steps.resolve.outputs.OCI_TAGS }}"
            echo "- source digest: \`${{ steps.resolve.outputs.OCI_DIGEST }}\`"
            echo "- publish release assets: \`${OCI_PUBLISH_RELEASE_ASSETS:-false}\`"
            if [[ "${OCI_PUBLISH_RELEASE_ASSETS:-false}" == "true" ]]; then
              echo "- github release tag: \`v${OCI_VERSION}\`"
              echo "- release assets:"
              while IFS= read -r file; do
                if [[ -n "${file}" ]]; then
                  echo "  - \`${file}\`"
                fi
              done <<< "${OCI_RELEASE_ASSET_FILES}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
