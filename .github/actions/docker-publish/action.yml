name: Docker Publish Composite Action
description: Build, publish, and gate OCI images

inputs:
  OCI_REGISTRY:
    description: "Docker registry host (for example: nexus.example.com)"
    required: true
  OCI_IMAGE_NAME:
    description: "Image repository/name (for example: team/app)"
    required: true
  OCI_DOCKERFILE_PATH:
    description: Dockerfile path
    required: false
    default: Dockerfile
  OCI_BUILD_CONTEXT:
    description: Docker build context
    required: false
    default: .
  OCI_TARGET_PLATFORMS:
    description: Target platforms
    required: false
    default: linux/amd64
  OCI_BUILD_ARGS:
    description: Build args, newline-delimited KEY=VALUE entries
    required: false
    default: ""
  OCI_PUSH_IMAGE:
    description: Whether to push image to registry
    required: false
    default: "true"
  OCI_PUBLISH_CHANNEL:
    description: "Publish channel: none|edge|release"
    required: false
    default: none
  OCI_RELEASE_VERSION:
    description: "Release version for release channel (for example: 1.2.3 or 1.2.3-rc.1)"
    required: false
    default: ""
  OCI_PUBLISH_LATEST:
    description: Whether to publish latest tag for stable release only
    required: false
    default: "false"
  OCI_GATE_RUN_ARGS:
    description: Optional docker run args used by startup gate
    required: false
    default: ""
  OCI_GATE_HEALTH_URL:
    description: Optional health check URL for startup gate
    required: false
    default: ""
  OCI_GATE_SMOKE_CMD:
    description: Optional smoke command executed inside gate container
    required: false
    default: ""
  OCI_GATE_TIMEOUT_SECONDS:
    description: Startup/health gate timeout in seconds
    required: false
    default: "60"
  OCI_GATE_VULN_SEVERITY:
    description: Vulnerability severities for Trivy scan
    required: false
    default: CRITICAL,HIGH
  OCI_GATE_VULN_IGNORE_UNFIXED:
    description: Ignore unfixed vulnerabilities in Trivy scan
    required: false
    default: "false"
  nexus_username:
    description: Nexus registry username
    required: false
    default: ""
  nexus_password:
    description: Nexus registry password
    required: false
    default: ""
  PYPI_UPLOAD_WHEEL:
    description: Whether to build and upload wheel to Nexus PyPI
    required: false
    default: "false"
  PYPI_REPOSITORY_URL:
    description: Nexus PyPI repository upload URL
    required: false
    default: ""
  PYPI_SIMPLE_URL:
    description: Nexus PyPI simple index URL
    required: false
    default: ""
  PYPI_PACKAGE_NAME:
    description: Python package name
    required: false
    default: ksrpc
  PYPI_TRUSTED_HOST:
    description: Optional trusted host for pip install command in image build
    required: false
    default: ""

outputs:
  image_ref:
    description: Fully qualified image reference without tag
    value: ${{ steps.tags.outputs.image_ref }}
  image_tags:
    description: Published image tags as comma-separated list
    value: ${{ steps.tags.outputs.image_tags }}
  digest:
    description: Image digest from docker/build-push-action
    value: ${{ steps.build.outputs.digest }}
  image_with_digest:
    description: Image reference pinned by digest
    value: ${{ steps.final_ref.outputs.image_with_digest }}
  wheel_file:
    description: Built wheel filename
    value: ${{ steps.wheel.outputs.wheel_file }}
  wheel_version:
    description: Built wheel version
    value: ${{ steps.wheel.outputs.wheel_version }}
  wheel_install_cmd:
    description: Install command from Nexus PyPI
    value: ${{ steps.wheel.outputs.wheel_install_cmd }}

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Resolve image tags
      id: tags
      shell: bash
      env:
        OCI_REGISTRY: ${{ inputs.OCI_REGISTRY }}
        OCI_IMAGE_NAME: ${{ inputs.OCI_IMAGE_NAME }}
        OCI_PUBLISH_CHANNEL: ${{ inputs.OCI_PUBLISH_CHANNEL }}
        OCI_RELEASE_VERSION: ${{ inputs.OCI_RELEASE_VERSION }}
        OCI_PUBLISH_LATEST: ${{ inputs.OCI_PUBLISH_LATEST }}
        GITHUB_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail

        image_ref="${OCI_REGISTRY%/}/${OCI_IMAGE_NAME}"
        short_sha="${GITHUB_SHA:0:12}"
        sha_tag="sha-${short_sha}"

        tags=("${image_ref}:${sha_tag}")
        channel="${OCI_PUBLISH_CHANNEL:-none}"
        release_version="${OCI_RELEASE_VERSION:-}"
        stable_release="false"

        case "${channel}" in
          none)
            ;;
          edge)
            tags+=("${image_ref}:edge")
            ;;
          release)
            if [[ -z "${release_version}" ]]; then
              echo "OCI_RELEASE_VERSION is required when OCI_PUBLISH_CHANNEL=release" >&2
              exit 1
            fi
            normalized_version="${release_version#v}"
            if [[ ! "${normalized_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
              echo "invalid OCI_RELEASE_VERSION: ${release_version}" >&2
              exit 1
            fi
            tags+=("${image_ref}:${normalized_version}")
            if [[ "${normalized_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              stable_release="true"
              major_minor="${normalized_version%.*}"
              major="${major_minor%%.*}"
              tags+=("${image_ref}:${major_minor}")
              tags+=("${image_ref}:${major}")
            fi
            ;;
          *)
            echo "invalid OCI_PUBLISH_CHANNEL: ${channel} (allowed: none|edge|release)" >&2
            exit 1
            ;;
        esac

        if [[ "${OCI_PUBLISH_LATEST}" == "true" && "${stable_release}" == "true" ]]; then
          tags+=("${image_ref}:latest")
        fi

        image_tags_csv=""
        for full_tag in "${tags[@]}"; do
          tag="${full_tag#${image_ref}:}"
          if [[ -z "${image_tags_csv}" ]]; then
            image_tags_csv="${tag}"
          else
            image_tags_csv="${image_tags_csv},${tag}"
          fi
        done

        {
          echo "tags<<EOF"
          printf '%s\n' "${tags[@]}"
          echo "EOF"
          echo "image_ref=${image_ref}"
          echo "image_tags=${image_tags_csv}"
        } >> "${GITHUB_OUTPUT}"

    - name: Build and upload wheel to Nexus PyPI
      id: wheel
      if: ${{ inputs.PYPI_UPLOAD_WHEEL == 'true' }}
      shell: bash
      env:
        PYPI_REPOSITORY_URL: ${{ inputs.PYPI_REPOSITORY_URL }}
        PYPI_SIMPLE_URL: ${{ inputs.PYPI_SIMPLE_URL }}
        PYPI_PACKAGE_NAME: ${{ inputs.PYPI_PACKAGE_NAME }}
        PYPI_TRUSTED_HOST: ${{ inputs.PYPI_TRUSTED_HOST }}
        TWINE_USERNAME: ${{ inputs.nexus_username }}
        TWINE_PASSWORD: ${{ inputs.nexus_password }}
      run: |
        set -euo pipefail

        if [[ -z "${PYPI_REPOSITORY_URL}" || -z "${PYPI_SIMPLE_URL}" ]]; then
          echo "PYPI_REPOSITORY_URL and PYPI_SIMPLE_URL are required when PYPI_UPLOAD_WHEEL=true" >&2
          exit 1
        fi

        python3 -m pip install --upgrade pip build twine
        rm -rf dist
        python3 -m build --wheel --outdir dist

        wheel_file="$(ls -1 dist/*.whl | head -n1)"
        if [[ -z "${wheel_file}" ]]; then
          echo "no wheel artifact found in dist/" >&2
          exit 1
        fi
        wheel_base="$(basename "${wheel_file}")"
        wheel_version="$(
          python3 -c 'import re,sys; w=sys.argv[1]; m=re.match(r"^[^-]+-([^-]+)-", w); print(m.group(1) if m else "")' "${wheel_base}"
        )"
        if [[ -z "${wheel_version}" ]]; then
          echo "failed to parse wheel version from ${wheel_base}" >&2
          exit 1
        fi

        upload_log="$(mktemp)"
        set +e
        python3 -m twine upload --non-interactive --repository-url "${PYPI_REPOSITORY_URL}" "${wheel_file}" >"${upload_log}" 2>&1
        upload_rc=$?
        set -e
        if [[ "${upload_rc}" -ne 0 ]]; then
          if grep -Eiq "(already exists|File already exists|409 Conflict|400 Bad Request)" "${upload_log}"; then
            echo "wheel already exists in repository, continue."
          else
            cat "${upload_log}" >&2
            exit "${upload_rc}"
          fi
        fi

        install_cmd="pip install --index-url ${PYPI_SIMPLE_URL}"
        if [[ -n "${PYPI_TRUSTED_HOST}" ]]; then
          install_cmd="${install_cmd} --trusted-host ${PYPI_TRUSTED_HOST}"
        fi
        install_cmd="${install_cmd} ${PYPI_PACKAGE_NAME}==${wheel_version}"

        {
          echo "wheel_file=${wheel_base}"
          echo "wheel_version=${wheel_version}"
          echo "wheel_install_cmd=${install_cmd}"
        } >> "${GITHUB_OUTPUT}"

    - name: Resolve build args
      id: build_args
      shell: bash
      env:
        OCI_BUILD_ARGS: ${{ inputs.OCI_BUILD_ARGS }}
        PYPI_UPLOAD_WHEEL: ${{ inputs.PYPI_UPLOAD_WHEEL }}
        PYPI_PACKAGE_NAME: ${{ inputs.PYPI_PACKAGE_NAME }}
        PYPI_SIMPLE_URL: ${{ inputs.PYPI_SIMPLE_URL }}
        PYPI_TRUSTED_HOST: ${{ inputs.PYPI_TRUSTED_HOST }}
        WHEEL_VERSION: ${{ steps.wheel.outputs.wheel_version }}
      run: |
        set -euo pipefail

        {
          echo "build_args<<EOF"
          if [[ -n "${OCI_BUILD_ARGS}" ]]; then
            printf '%s\n' "${OCI_BUILD_ARGS}"
          fi

          if [[ "${PYPI_UPLOAD_WHEEL}" == "true" ]]; then
            if [[ -z "${WHEEL_VERSION}" ]]; then
              echo "wheel version is empty while PYPI_UPLOAD_WHEEL=true" >&2
              exit 1
            fi
            echo "KSRPC_PIP_PACKAGE=${PYPI_PACKAGE_NAME}==${WHEEL_VERSION}"
            echo "PIP_INDEX_URL=${PYPI_SIMPLE_URL}"
            if [[ -n "${PYPI_TRUSTED_HOST}" ]]; then
              echo "PIP_TRUSTED_HOST=${PYPI_TRUSTED_HOST}"
            fi
          fi
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Login to Nexus registry
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ inputs.OCI_REGISTRY }}
        username: ${{ inputs.nexus_username }}
        password: ${{ inputs.nexus_password }}

    - name: Build and push image
      id: build
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: ${{ inputs.OCI_BUILD_CONTEXT }}
        file: ${{ inputs.OCI_DOCKERFILE_PATH }}
        platforms: ${{ inputs.OCI_TARGET_PLATFORMS }}
        push: ${{ inputs.OCI_PUSH_IMAGE == 'true' }}
        tags: ${{ steps.tags.outputs.tags }}
        build-args: ${{ steps.build_args.outputs.build_args }}

    - name: Resolve digest reference
      id: final_ref
      shell: bash
      env:
        IMAGE_REF: ${{ steps.tags.outputs.image_ref }}
        DIGEST: ${{ steps.build.outputs.digest }}
      run: |
        set -euo pipefail
        if [[ -n "${DIGEST}" ]]; then
          echo "image_with_digest=${IMAGE_REF}@${DIGEST}" >> "${GITHUB_OUTPUT}"
        else
          echo "image_with_digest=" >> "${GITHUB_OUTPUT}"
        fi

    - name: Login to OCI registry
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ inputs.OCI_REGISTRY }}
        username: ${{ inputs.nexus_username }}
        password: ${{ inputs.nexus_password }}

    - name: Pull image by digest
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' }}
      shell: bash
      env:
        IMAGE_WITH_DIGEST: ${{ steps.final_ref.outputs.image_with_digest }}
      run: |
        set -euo pipefail
        docker pull "${IMAGE_WITH_DIGEST}"

    - name: Startup gate
      id: startup
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' }}
      shell: bash
      env:
        IMAGE_WITH_DIGEST: ${{ steps.final_ref.outputs.image_with_digest }}
        OCI_GATE_RUN_ARGS: ${{ inputs.OCI_GATE_RUN_ARGS }}
        OCI_GATE_TIMEOUT_SECONDS: ${{ inputs.OCI_GATE_TIMEOUT_SECONDS }}
      run: |
        set -euo pipefail

        container_name="oci-gate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
        timeout_seconds="${OCI_GATE_TIMEOUT_SECONDS:-60}"

        if [[ -n "${OCI_GATE_RUN_ARGS}" ]]; then
          read -r -a run_args <<< "${OCI_GATE_RUN_ARGS}"
        else
          run_args=()
        fi

        docker run -d --name "${container_name}" "${run_args[@]}" "${IMAGE_WITH_DIGEST}" >/dev/null

        start_epoch="$(date +%s)"
        while true; do
          status="$(docker inspect -f '{{.State.Status}}' "${container_name}" 2>/dev/null || true)"
          case "${status}" in
            running)
              break
              ;;
            exited|dead)
              docker logs "${container_name}" || true
              echo "container ${container_name} terminated during startup" >&2
              exit 1
              ;;
          esac

          now_epoch="$(date +%s)"
          if (( now_epoch - start_epoch >= timeout_seconds )); then
            docker logs "${container_name}" || true
            echo "container ${container_name} did not reach running state within ${timeout_seconds}s" >&2
            exit 1
          fi
          sleep 2
        done

        echo "container_name=${container_name}" >> "${GITHUB_OUTPUT}"

    - name: Optional health URL check
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' && inputs.OCI_GATE_HEALTH_URL != '' }}
      shell: bash
      env:
        OCI_GATE_HEALTH_URL: ${{ inputs.OCI_GATE_HEALTH_URL }}
        OCI_GATE_TIMEOUT_SECONDS: ${{ inputs.OCI_GATE_TIMEOUT_SECONDS }}
      run: |
        set -euo pipefail

        timeout_seconds="${OCI_GATE_TIMEOUT_SECONDS:-60}"
        start_epoch="$(date +%s)"
        until curl -fsS "${OCI_GATE_HEALTH_URL}" >/dev/null; do
          now_epoch="$(date +%s)"
          if (( now_epoch - start_epoch >= timeout_seconds )); then
            echo "health check timeout: ${OCI_GATE_HEALTH_URL}" >&2
            exit 1
          fi
          sleep 2
        done

    - name: Optional smoke command
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' && inputs.OCI_GATE_SMOKE_CMD != '' }}
      shell: bash
      env:
        CONTAINER_NAME: ${{ steps.startup.outputs.container_name }}
        OCI_GATE_SMOKE_CMD: ${{ inputs.OCI_GATE_SMOKE_CMD }}
      run: |
        set -euo pipefail
        docker exec "${CONTAINER_NAME}" sh -lc "${OCI_GATE_SMOKE_CMD}"

    - name: Vulnerability scan
      if: ${{ inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' }}
      shell: bash
      env:
        IMAGE_WITH_DIGEST: ${{ steps.final_ref.outputs.image_with_digest }}
        OCI_GATE_VULN_SEVERITY: ${{ inputs.OCI_GATE_VULN_SEVERITY }}
        OCI_GATE_VULN_IGNORE_UNFIXED: ${{ inputs.OCI_GATE_VULN_IGNORE_UNFIXED }}
      run: |
        set -euo pipefail

        trivy_image="aquasec/trivy:latest"
        scan_args=(
          image
          --scanners vuln
          --format table
          --exit-code 1
          --severity "${OCI_GATE_VULN_SEVERITY}"
        )

        if [[ "${OCI_GATE_VULN_IGNORE_UNFIXED}" == "true" ]]; then
          scan_args+=(--ignore-unfixed)
        fi

        docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          "${trivy_image}" \
          "${scan_args[@]}" \
          "${IMAGE_WITH_DIGEST}"

    - name: Generate Trivy JSON report
      if: ${{ always() && inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' }}
      shell: bash
      env:
        IMAGE_WITH_DIGEST: ${{ steps.final_ref.outputs.image_with_digest }}
        OCI_GATE_VULN_SEVERITY: ${{ inputs.OCI_GATE_VULN_SEVERITY }}
        OCI_GATE_VULN_IGNORE_UNFIXED: ${{ inputs.OCI_GATE_VULN_IGNORE_UNFIXED }}
        TRIVY_REPORT_PATH: .artifacts/trivy/trivy-report.json
      run: |
        set -euo pipefail

        mkdir -p "$(dirname "${TRIVY_REPORT_PATH}")"

        trivy_image="aquasec/trivy:latest"
        scan_args=(
          image
          --scanners vuln
          --format json
          --exit-code 0
          --severity "${OCI_GATE_VULN_SEVERITY}"
        )

        if [[ "${OCI_GATE_VULN_IGNORE_UNFIXED}" == "true" ]]; then
          scan_args+=(--ignore-unfixed)
        fi

        if ! docker run --rm \
          -v /var/run/docker.sock:/var/run/docker.sock \
          "${trivy_image}" \
          "${scan_args[@]}" \
          "${IMAGE_WITH_DIGEST}" > "${TRIVY_REPORT_PATH}"; then
          echo '{"error":"trivy_json_report_failed"}' > "${TRIVY_REPORT_PATH}"
        fi

    - name: Upload Trivy JSON report
      if: ${{ always() && inputs.OCI_PUSH_IMAGE == 'true' && steps.final_ref.outputs.image_with_digest != '' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: trivy-image-report
        path: .artifacts/trivy/trivy-report.json
        if-no-files-found: warn

    - name: Cleanup gate container
      if: ${{ always() && steps.startup.outputs.container_name != '' }}
      shell: bash
      env:
        CONTAINER_NAME: ${{ steps.startup.outputs.container_name }}
      run: |
        set -euo pipefail
        docker logs "${CONTAINER_NAME}" || true
        docker rm -f "${CONTAINER_NAME}" || true
